<!DOCTYPE html>

<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Painel de Licitações</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">

</head>

<body class="bg-light">

<div class="container mt-4">

<h5 class="mb-2">Painel de Licitações</h5>

<div class="d-flex justify-content-between align-items-center mb-3">

<div id="dashboard" class="small text-muted">
Total: <strong id="totalLic">0</strong> |
Andamento: <strong id="andamentoLic">0</strong> |
Ganhas: <strong id="ganhasLic">0</strong> |
Perdidas: <strong id="perdidasLic">0</strong>
</div>

<div class="d-flex gap-2">

<input id="busca" class="form-control form-control-sm" placeholder="Buscar órgão, pregão ou estado">

<select id="filtroMes" class="form-select form-select-sm" style="width:160px">
<option value="">Todos os meses</option>
</select>

<a href="/" class="btn btn-outline-secondary btn-sm">
Sair
</a>

</div>

</div>

<button class="btn btn-primary btn-sm mb-3" onclick="abrirNova()">
Nova Licitação
</button>

<div class="row" id="lista"></div>

</div>

<!-- MODAL -->

<div class="modal fade" id="modalLic">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Licitação</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<form id="formLic" enctype="multipart/form-data">

<div class="modal-body">

<div class="mb-2">
<label>Data</label>
<input type="date" name="data" class="form-control">
</div>

<div class="mb-2">
<label>Hora</label>
<input type="time" name="hora" class="form-control">
</div>

<div class="mb-2">
<label>Pregão</label>
<input type="text" name="pregao" class="form-control">
</div>

<div class="mb-2">
<label>UASG</label>
<input type="text" name="uasg" class="form-control">
</div>

<div class="mb-2">
<label>Estado</label>
<input type="text" name="estado" class="form-control">
</div>

<div class="mb-2">
<label>Órgão</label>
<input type="text" name="orgao" class="form-control">
</div>

<div class="mb-2">
<label>Serviço</label>
<input type="text" name="servico" class="form-control">
</div>

<div class="mb-2">
<label>Valor</label>
<input type="text" name="valor" class="form-control">
</div>

<div class="mb-2">
<label>Modalidade</label>
<input type="text" name="modalidade" class="form-control">
</div>

<div class="mb-2">
<label>Status</label>

<select name="status" class="form-control">

<option>Em andamento</option>
<option>Ganha</option>
<option>Perdida</option>
<option>Adiada</option>
<option>Suspensa</option>
<option>Revogada</option>

</select>

</div>

<div class="mb-2">
<label>Anexar edital</label>
<input type="file" name="edital" class="form-control">
</div>

</div>

<div class="modal-footer">

<button type="button" class="btn btn-danger btn-sm" onclick="excluirLic()">
Excluir
</button>

<button type="submit" class="btn btn-success btn-sm">
Salvar
</button>

</div>

</form>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="/static/script.js"></script>

</body>
</html>
