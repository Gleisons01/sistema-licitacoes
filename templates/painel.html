<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema de Licitações</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
<h3 class="mb-3">Controle de Licitações</h3>

<div class="dashboard">
    <div class="card"><div>Total<br><h3 id="totalLic">0</h3></div></div>
    <div class="card"><div>Em andamento<br><h3 id="andamentoLic">0</h3></div></div>
    <div class="card"><div>Ganhas<br><h3 id="ganhasLic">0</h3></div></div>
    <div class="card"><div>Perdidas<br><h3 id="perdidasLic">0</h3></div></div>
</div>

<div id="filtros" class="d-flex gap-2 mb-3">
    <input type="month" id="filtroMes" class="form-control">
    <input type="text" id="filtroOrgao" class="form-control" placeholder="Filtrar por órgão">
    <select id="filtroEstado" class="form-control">
        <option value="">Estado</option>
        <option value="CE">CE</option>
        <option value="PB">PB</option>
        <option value="PE">PE</option>
        <option value="RN">RN</option>
        <option value="BA">BA</option>
    </select>
    <button class="btn btn-primary" onclick="abrirNova()">Nova Licitação</button>
</div>

<div id="alertaHoje"></div>
<div class="row" id="lista"></div>
</div>

<!-- Modal Licitação -->
<div class="modal fade" id="modalLic">
<div class="modal-dialog modal-lg">
<div class="modal-content">
<div class="modal-header"><h5>Licitação</h5></div>
<div class="modal-body">
<form id="formLic">
<div class="row">
<div class="col-md-4"><label>Data</label><input type="date" name="data" class="form-control"></div>
<div class="col-md-2"><label>Hora</label><input type="time" name="hora" class="form-control"></div>
<div class="col-md-3"><label>Pregão</label><input type="text" name="pregao" class="form-control"></div>
<div class="col-md-3"><label>UASG</label><input type="text" name="uasg" class="form-control"></div>
</div>
<div class="row mt-2">
<div class="col-md-3"><label>Estado</label><input type="text" name="estado" class="form-control"></div>
<div class="col-md-9"><label>Órgão</label><input type="text" name="orgao" class="form-control"></div>
</div>
<div class="row mt-2">
<div class="col-md-6"><label>Serviço</label><input type="text" name="servico" class="form-control"></div>
<div class="col-md-3"><label>Valor</label><input type="text" name="valor" class="form-control"></div>
<div class="col-md-3"><label>Modalidade</label><input type="text" name="modalidade" class="form-control"></div>
</div>
<div class="row mt-2">
<div class="col-md-4"><label>Status</label>
<select name="status" class="form-control">
<option>Em andamento</option>
<option>Ganha</option>
<option>Perdida</option>
<option>Adiada</option>
<option>Suspensa</option>
<option>Revogada</option>
</select></div>
</div>
</form>
</div>
<div class="modal-footer">
<button class="btn btn-danger" onclick="excluirLic()">Excluir</button>
<button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
<button class="btn btn-success" onclick="document.getElementById('formLic').requestSubmit()">Salvar</button>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/script.js"></script>
</body>
</html>
