<!DOCTYPE html>
<html>
<head>
<title>Sistema de Licitações</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<style>
body{
background:#eef1f5;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}
.login{
width:350px;
}
</style>
</head>
<body>
<div class="card shadow p-4 login">
<h4 class="text-center">Sistema de Licitações</h4>
<input id="usuario" class="form-control mt-3" placeholder="Usuário">
<input id="senha" type="password" class="form-control mt-2" placeholder="Senha">
<button onclick="login()" class="btn btn-primary mt-3">Entrar</button>
</div>
<script>
function login(){
let u = document.getElementById("usuario").value
let s = document.getElementById("senha").value
if(u === "Gleison" && s === "Gs12345"){
window.location="/painel"
}else{
alert("Login inválido")
}
}
</script>
</body>
</html>
